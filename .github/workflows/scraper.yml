name: Sgcarmart Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: playwright install --with-deps

      - run: python listings.py   # make sure this matches your filename

      - name: Upload scraped data
        uses: actions/upload-artifact@v3
        with:
          name: sgcarmart-data
          path: sgcarmart.json